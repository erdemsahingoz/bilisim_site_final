# ============================================================
# BİLİŞİM MAĞAZASI — Spring Boot Uygulama Yapılandırması
# Dosya: SourceCode/backend/src/main/resources/application.properties
#
# NOT: Bu proje application.yml kullanmaktadır.
#      application.yml ile aynı ayarların .properties karşılığıdır.
# ============================================================

# Uygulama adı
spring.application.name=bilisim-store

# ── MySQL Veritabanı Bağlantısı ──────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/bilisim_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=1111
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA / Hibernate Ayarları ──────────────────────────────────
# update: tabloları otomatik oluşturur/günceller
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ── SQL Başlatma ───────────────────────────────────────────────
spring.sql.init.mode=never

# ── Sunucu Portu ──────────────────────────────────────────────
server.port=8080
server.error.include-message=always

# ── Firebase Admin SDK ────────────────────────────────────────
# firebase-service-account.json → src/main/resources/ klasörüne koyun
app.firebase.service-account-path=classpath:firebase-service-account.json

# ── Stripe Gizli Anahtar ──────────────────────────────────────
# Gerçek key için: set STRIPE_SECRET_KEY=sk_test_xxxx (Windows)
# veya: export STRIPE_SECRET_KEY=sk_test_xxxx (macOS/Linux)
app.stripe.secret-key=${STRIPE_SECRET_KEY:sk_test_YOUR_STRIPE_SECRET_KEY_HERE}

# ── CORS ──────────────────────────────────────────────────────
# React geliştirme sunucusu adresi
app.cors.allowed-origins=http://localhost:3000

# ── Loglama ───────────────────────────────────────────────────
logging.level.com.bilisim=DEBUG
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=DEBUG
